{% extends "index.html" %}

{% block title %}
    Skribbl.db
{% endblock %}

{% block content %}
    <p><a href="/">HOME</a></p>

    <h1>Words</h1>

    <h2>New Word</h2>

    <form id="word-form" action="" method="post">
        {% csrf_token %}
        <table>
        {{ form.word }}
        </table>
        <input type="submit" value="Submit">
    </form>

    <h2>WordSet</h2>

    <div class="copy-box">
        {% include '_word_list.html' %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('word-form');

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const formData = new FormData(form);

                fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': formData.get('csrfmiddlewaretoken'),
                    },
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('word-list').outerHTML = data.list_html
                        form.reset(); 
                    } else {
                        // handle validation errors, e.g. re-render error messages
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        });
    </script>
{% endblock %}
