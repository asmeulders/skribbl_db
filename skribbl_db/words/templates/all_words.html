{% extends "index.html" %}

{% block title %}
    Skribbl.db
{% endblock %}

{% block content %}
    <p><a href="/">HOME</a></p>

    <h1>Words</h1>

    <div class="wordset-grid">
        <div class="wordset-grid-item"><h3>Custom WordSets</h2></div>
        
        <div class="wordset-grid-item">
            <button type="button">New</button>
            <button type="button">...</button>
        </div>

        <ul class="wordset-grid-item">
            <li>Easy</li> 
            <li>Easy</li> 
            <li>Easy</li> 
            <li>Easy</li> 
        </ul>

        <div class="wordset-grid-item">
            <div class="copy-box">
                {% include '_word_list.html' %}
            </div>
            <h4>New Word</h4>

            <form id="word-form" action="" method="post">
                {% csrf_token %}
                <table>
                {{ form.word }}
                </table>
                <input type="submit" value="Submit">
            </form>
        </div>
    </div>    

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('word-form');

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const formData = new FormData(form);

                fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': formData.get('csrfmiddlewaretoken'),
                    },
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('word-list').outerHTML = data.list_html
                        form.reset(); 
                    } else {
                        // handle validation errors, e.g. re-render error messages
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        });
    </script>
{% endblock %}
